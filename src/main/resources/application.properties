server.port=${PORT:8000}
spring.application.name=meeting-ai-backend

# ─── Database (auto-switches: SQLite local, Postgres cloud) ───
spring.datasource.url=${DATABASE_URL:jdbc:sqlite:meetings.db}
spring.datasource.driver-class-name=${DB_DRIVER:org.sqlite.JDBC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── PROVIDER MODE: local or cloud ───
app.mode=${APP_MODE:local}

# ─── Local (Ollama + ChromaDB) ───
ollama.base-url=http://localhost:11434
ollama.chat-model=llama3
ollama.embed-model=nomic-embed-text
chroma.base-url=http://localhost:8001
chroma.collection-name=meetings

# ─── Cloud (Groq + Jina + Qdrant) ───
groq.api-key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile
jina.api-key=${JINA_API_KEY:}
jina.model=jina-embeddings-v3
qdrant.url=${QDRANT_URL:}
qdrant.api-key=${QDRANT_API_KEY:}
qdrant.collection=meetings
